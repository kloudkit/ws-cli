---
name: 💻 CLI Build

on:
  push:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    if: github.actor != 'renovate[bot]'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7

      - name: 🔵 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - uses: pre-commit/action@v3.0.1

  build:
    name: 💻 CLI Build
    runs-on: ubuntu-latest
    needs:
      - lint

    strategy:
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🔵 Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: ⏬ Install Dependencies
        run: go get .

      - name: ⬇️ Fetch `env.reference.yaml` from `ws-meta`
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/kloudkit/ws-meta/main/shared/workspace/env.reference.yaml \
            -o "${{ runner.temp }}/env.reference.yaml"

      - name: 🧪 Test
        env:
          WS__INTERNAL_ENV_REFERENCE: ${{ runner.temp }}/env.reference.yaml
        run: go test -v ./...

      - name: 👷‍♂️ Build for ${{ matrix.arch }}
        run: GOOS=linux GOARCH=${{ matrix.arch }} go build -o ws-cli-${{ matrix.arch }}
